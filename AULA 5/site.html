<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Conversor de Dólar</h1>
    <input placeholder="Valor em Reais" type="number" step="0.01">
    <button onclick="converter()">Converter</button>

    
    
</body>
<script>
    const valorReal = document.querySelector("input")
    document.querySelector("h1").style.color = "blue"
 function converter() {
   const valorConvertido = valorReal.value / 5.25
   alert(`O valor convertido é: $ ${valorConvertido.toFixed(2)} dólares`)


 }
</script>
</html>
